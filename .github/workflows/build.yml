name: Build GKI Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://android.googlesource.com/kernel/common
          kernel-branch: android14-6.1
          config: gki_defconfig
          arch: arm64
          android-version: 14
          aosp-gcc: true
          aosp-clang: true
          ksu: true
          ksu-version: main
          disable-lto: true
          anykernel3: true
